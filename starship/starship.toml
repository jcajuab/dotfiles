add_newline = false
format = "$username$hostname$directory$character"
right_format = "$git_branch"
palette = "dracula"

[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

[character]
success_symbol = "[λ](bold green)"
error_symbol = "[λ](bold red)"
vimcmd_symbol = "[Λ](bold green)"

[directory]
style = "green"

[git_branch]
format = "[$branch]($style)"
style = "bold pink"

[hostname]
style = "purple"

[username]
style_user = "cyan"
